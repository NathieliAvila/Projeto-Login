<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <title>Login</title>
</head>
<body>

    <main>
        <section id="login">
            <div id="imagem">
    
            </div>

            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente</p>

                <form action="login.js" method="post">
                    <div class="campo">
                        <label for="iEmail"><span class="material-symbols-outlined">person</span></label>
                        <input type="email" name="e-mail" id="iEmail" required placeholder="seu e-mail">
                    </div>

                    <div class="campo">
                        <label for="iSenha"><span class="material-symbols-outlined">vpn_key</span></label>
                        <input type="password" name="senha" id="iSenha" required placeholder="sua senha">
                    </div>

                    <input type="submit" value="Entrar">
                    <a href="#" class="botao">Esqueci a senha</a>

                </form>

            </div>


        </section>

    </main>
    
</body>
</html>
